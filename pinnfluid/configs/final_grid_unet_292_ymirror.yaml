name: final_grid_unet_292_ymirror

base:
  split_json: pinnfluid/splits/recommended_292domains_struct_al_full_ymirror.json
  device: cuda
  epochs: 500
  mode: pinn
  scheduler: onecycle
  amp: false
  resume: true
  wandb_project: pinn_terr_struc
  wandb_tags: final,292domains,ymirror,grid_unet,pinn
  plot_eval: true
  train_loss: charb_weighted
  momentum_loss_mode: nut
  overrides:
    DATA_CFD_ROOT: data/cfd_ymirror

runs:
  - id: grid-unet-stage1-292d
    experiment_name: final/grid-unet-stage1-292d
    model: grid_unet
    train_struc_mode: grad
    train_struc_weight: 0.05
    overrides:
      W_DATA_ROI: 2.0
      GRID_UNET_BASE_WIDTH: 32
      GRID_UNET_LEVELS: 4
      GRID_UNET_DROPOUT: 0.0
      GRID_UNET_ROI_STRUCTURE_MODE: context_v2
      GRID_UNET_USE_TERRAIN_CONTEXT: true
      GRID_UNET_TERRAIN_CONTEXT_WIDTH: 32
      GRID_UNET_TERRAIN_CONTEXT_DEPTH: 5
      GRID_UNET_TERRAIN_CONTEXT_DILATIONS: [1, 2, 4, 8, 16, 32]
      GLOBAL_PATCH_SHAPE: [32, 32, 16]
      GLOBAL_POINTS_PER_DOMAIN: 65536
      GLOBAL_PATCHES_PER_DOMAIN: 4
      MIN_EPOCH_FOR_BEST: 100
      EARLY_STOPPING_PATIENCE: 80

  - id: grid-unet-stage2-292d
    experiment_name: final/grid-unet-stage2-292d
    model: cascade
    train_struc_mode: grad
    train_struc_weight: 0.10
    cascade_stage1_checkpoint: results/final/grid-unet-stage1-292d/checkpoints/best.pth
    overrides:
      CASCADE_STAGE: stage2
      CASCADE_STAGE2_REFINER_KIND: grid_unet
      CASCADE_ZERO_INIT_HEAD: true
      GRID_UNET_BASE_WIDTH: 32
      GRID_UNET_LEVELS: 4
      GRID_UNET_DROPOUT: 0.0
      GRID_UNET_ROI_STRUCTURE_MODE: context_v3
      GRID_UNET_USE_TERRAIN_CONTEXT: true
      GRID_UNET_TERRAIN_CONTEXT_WIDTH: 32
      GRID_UNET_TERRAIN_CONTEXT_DEPTH: 5
      GRID_UNET_TERRAIN_CONTEXT_DILATIONS: [1, 2, 4, 8, 16, 32]
      CASCADE_STAGE2_GRID_MAX_ROI_CELLS: 10000000
      GLOBAL_PATCH_SHAPE: [32, 32, 16]
      ROI_PATCH_SHAPE: [32, 32, 16]
      ROI_PATCHES_PER_DOMAIN: 4
      PATCH_NEAR_GROUND_PROB: 0.75
      ROI_PATCH_HIGH_SPEED_PROB: 0.60
      ROI_PATCH_HIGH_SPEED_RATIO_MIN: 1.05
      ROI_PATCH_HIGH_SPEED_ZREL_MAX: 30.0
      MIN_EPOCH_FOR_BEST: 40
      EARLY_STOPPING_PATIENCE: 50
      CASCADE_EDGE_WEIGHT: 0.25
      CASCADE_EDGE_BAND_XY_M: 15.0
      CASCADE_EDGE_BAND_Z_M: 10.0
      CASCADE_STAGE2_MS_REPEAT_ENABLED: true
      CASCADE_STAGE2_MS_REPEAT_N2: 8
      CASCADE_STAGE2_MS_REPEAT_N3: 24
      CASCADE_STAGE2_MS_REPEAT_MAX: 3
      W_DATA_ROI: 5.0
      W_PHYS_ROI: 1.0
      W_DIV_ROI: 0.05
      W_MOM_ROI: 0.02
      W_BC_WALL_ROI: 0.0
      ROI_DATA_P_WEIGHT: 3.0
      SUP_WEIGHT_NEAR_STRUCTURE_GAIN: 3.0
      SUP_WEIGHT_NEAR_STRUCTURE_DMAX: 2.0
      SUP_WEIGHT_WAKE_GAIN: 3.0
      SUP_WEIGHT_WAKE_ZREL_MAX: 30.0
      SUP_WEIGHT_WAKE_SPEED_RATIO_MAX: 0.75
      SUP_WEIGHT_WAKE_POWER: 2.0
      VAL_SELECTOR_USE_GAUGE_P: true
      VAL_SELECTOR_MS_ROI_UMAG_WEIGHT: 0.35
      LR: 1.0e-4
