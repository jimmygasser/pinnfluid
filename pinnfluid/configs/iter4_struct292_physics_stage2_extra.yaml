name: iter4_struct292_physics_stage2_extra

base:
  split_json: scripts/splits/recommended_292domains_struct_al_full.json
  device: cuda
  epochs: 500
  mode: pinn
  scheduler: onecycle
  amp: false
  resume: true
  wandb_project: pinn_terr_struc
  wandb_tags: iter4,struct292,physics_ablation,stage2_extra
  plot_eval: true
  train_loss: charb_weighted
  momentum_loss_mode: constant

runs:
  - id: cascade_stage2_292_hybridbg_targeted_structrf_roirf_fullon
    experiment_name: sweep/iter4_struct292_physics/cascade_stage2_292_hybridbg_targeted_structrf_roirf_fullon
    model: cascade
    train_struc_mode: grad
    train_struc_weight: 0.10
    cascade_stage1_checkpoint: results/sweep/iter4_struct292/pot2_292_globalrf_fulldomainrf/checkpoints/best.pth
    overrides:
      CASCADE_STAGE: stage2
      CASCADE_ZERO_INIT_HEAD: true
      STRUCTURE_ENCODER_INPUT_MODE: context_v2
      GLOBAL_ENCODER_DEPTH: 5
      GLOBAL_ENCODER_DILATIONS: [1, 2, 4, 8, 16, 32]
      MIN_EPOCH_FOR_BEST: 40
      EARLY_STOPPING_PATIENCE: 50
      CASCADE_EDGE_WEIGHT: 0.25
      CASCADE_EDGE_BAND_XY_M: 15.0
      CASCADE_EDGE_BAND_Z_M: 10.0
      ROI_POINTS_PER_DOMAIN: 16384
      ROI_PATCHES_PER_DOMAIN: 4
      ROI_SUPERVISED_SAMPLER_MODE: targeted_v1
      ROI_TARGET_VERY_NEAR_WALL_FRAC: 0.20
      ROI_TARGET_NEAR_WALL_FRAC: 0.25
      ROI_TARGET_GEOM_WAKE_FRAC: 0.25
      ROI_TARGET_LOW_SPEED_FRAC: 0.20
      ROI_TARGET_RANDOM_FRAC: 0.10
      ROI_TARGET_VERY_NEAR_WALL_DMAX: 1.0
      ROI_TARGET_VERY_NEAR_WALL_MAX_REPEAT: 4
      ROI_TARGET_NEAR_WALL_DMAX: 5.0
      ROI_TARGET_NEAR_WALL_BACKFILL_DMAX: 10.0
      ROI_TARGET_WAKE_MIN_CONTEXT: 0.15
      ROI_TARGET_WAKE_ZREL_MAX: 30.0
      ROI_TARGET_LOW_SPEED_RATIO_MAX: 0.75
      ROI_TARGET_LOW_SPEED_ZREL_MAX: 30.0
      ROI_TARGET_MAX_ABOVE_STRUCTURE_H: 2.0
      STRUCTURE_ENCODER_DEPTH: 5
      STRUCTURE_ENCODER_DILATIONS: [1, 2, 4, 8, 16, 32]
      ROI_ENCODER_DEPTH: 5
      ROI_ENCODER_DILATIONS: [1, 2, 4, 8, 16, 32]
      W_DATA_ROI: 5.0
      W_PHYS_ROI: 1.0
      W_DIV_ROI: 0.05
      W_MOM_ROI: 0.02
      W_BC_WALL_ROI: 0.0
      ROI_DATA_P_WEIGHT: 3.0
      SUP_WEIGHT_NEAR_STRUCTURE_GAIN: 3.0
      SUP_WEIGHT_NEAR_STRUCTURE_DMAX: 2.0
      SUP_WEIGHT_WAKE_GAIN: 3.0
      SUP_WEIGHT_WAKE_ZREL_MAX: 30.0
      SUP_WEIGHT_WAKE_SPEED_RATIO_MAX: 0.75
      LR: 3.0e-5

  - id: cascade_stage2_292_gridbg_unetrefiner_v1_lr1e4_fullon
    experiment_name: sweep/iter4_struct292_physics/cascade_stage2_292_gridbg_unetrefiner_v1_lr1e4_fullon
    model: cascade
    train_struc_mode: grad
    train_struc_weight: 0.10
    cascade_stage1_checkpoint: results/sweep/iter4_struct292/grid_unet_292_fulldomain_context/checkpoints/best.pth
    overrides:
      CASCADE_STAGE: stage2
      CASCADE_STAGE2_REFINER_KIND: grid_unet
      CASCADE_ZERO_INIT_HEAD: true
      GRID_UNET_BASE_WIDTH: 32
      GRID_UNET_LEVELS: 4
      GRID_UNET_DROPOUT: 0.0
      GRID_UNET_ROI_STRUCTURE_MODE: context_v3
      GRID_UNET_USE_TERRAIN_CONTEXT: true
      GRID_UNET_TERRAIN_CONTEXT_WIDTH: 32
      GRID_UNET_TERRAIN_CONTEXT_DEPTH: 5
      GRID_UNET_TERRAIN_CONTEXT_DILATIONS: [1, 2, 4, 8, 16, 32]
      CASCADE_STAGE2_GRID_MAX_ROI_CELLS: 10000000
      GLOBAL_PATCH_SHAPE: [32, 32, 16]
      ROI_PATCH_SHAPE: [32, 32, 16]
      ROI_PATCHES_PER_DOMAIN: 4
      PATCH_NEAR_GROUND_PROB: 0.75
      MIN_EPOCH_FOR_BEST: 40
      EARLY_STOPPING_PATIENCE: 50
      CASCADE_EDGE_WEIGHT: 0.25
      CASCADE_EDGE_BAND_XY_M: 15.0
      CASCADE_EDGE_BAND_Z_M: 10.0
      CASCADE_STAGE2_MS_REPEAT_ENABLED: false
      W_DATA_ROI: 5.0
      W_PHYS_ROI: 1.0
      W_DIV_ROI: 0.05
      W_MOM_ROI: 0.02
      W_BC_WALL_ROI: 0.0
      ROI_DATA_P_WEIGHT: 3.0
      SUP_WEIGHT_NEAR_STRUCTURE_GAIN: 3.0
      SUP_WEIGHT_NEAR_STRUCTURE_DMAX: 2.0
      SUP_WEIGHT_WAKE_GAIN: 3.0
      SUP_WEIGHT_WAKE_ZREL_MAX: 30.0
      SUP_WEIGHT_WAKE_SPEED_RATIO_MAX: 0.75
      SUP_WEIGHT_WAKE_POWER: 2.0
      LR: 1.0e-4

  - id: cascade_stage2_292_hybridbg_targeted_structrf_roirf_msrepeat_ramp
    experiment_name: sweep/iter4_struct292_physics/cascade_stage2_292_hybridbg_targeted_structrf_roirf_msrepeat_ramp
    model: cascade
    train_struc_mode: grad
    train_struc_weight: 0.10
    cascade_stage1_checkpoint: results/sweep/iter4_struct292/pot2_292_globalrf_fulldomainrf/checkpoints/best.pth
    overrides:
      CASCADE_STAGE: stage2
      CASCADE_ZERO_INIT_HEAD: true
      STRUCTURE_ENCODER_INPUT_MODE: context_v2
      GLOBAL_ENCODER_DEPTH: 5
      GLOBAL_ENCODER_DILATIONS: [1, 2, 4, 8, 16, 32]
      MIN_EPOCH_FOR_BEST: 75
      EARLY_STOPPING_PATIENCE: 50
      CASCADE_EDGE_WEIGHT: 0.25
      CASCADE_EDGE_BAND_XY_M: 15.0
      CASCADE_EDGE_BAND_Z_M: 10.0
      CASCADE_STAGE2_MS_REPEAT_ENABLED: true
      CASCADE_STAGE2_MS_REPEAT_N2: 8
      CASCADE_STAGE2_MS_REPEAT_N3: 24
      CASCADE_STAGE2_MS_REPEAT_MAX: 3
      ROI_POINTS_PER_DOMAIN: 16384
      ROI_PATCHES_PER_DOMAIN: 4
      ROI_SUPERVISED_SAMPLER_MODE: targeted_v1
      ROI_TARGET_VERY_NEAR_WALL_FRAC: 0.20
      ROI_TARGET_NEAR_WALL_FRAC: 0.25
      ROI_TARGET_GEOM_WAKE_FRAC: 0.25
      ROI_TARGET_LOW_SPEED_FRAC: 0.20
      ROI_TARGET_RANDOM_FRAC: 0.10
      ROI_TARGET_VERY_NEAR_WALL_DMAX: 1.0
      ROI_TARGET_VERY_NEAR_WALL_MAX_REPEAT: 4
      ROI_TARGET_NEAR_WALL_DMAX: 5.0
      ROI_TARGET_NEAR_WALL_BACKFILL_DMAX: 10.0
      ROI_TARGET_WAKE_MIN_CONTEXT: 0.15
      ROI_TARGET_WAKE_ZREL_MAX: 30.0
      ROI_TARGET_LOW_SPEED_RATIO_MAX: 0.75
      ROI_TARGET_LOW_SPEED_ZREL_MAX: 30.0
      ROI_TARGET_MAX_ABOVE_STRUCTURE_H: 2.0
      STRUCTURE_ENCODER_DEPTH: 5
      STRUCTURE_ENCODER_DILATIONS: [1, 2, 4, 8, 16, 32]
      ROI_ENCODER_DEPTH: 5
      ROI_ENCODER_DILATIONS: [1, 2, 4, 8, 16, 32]
      W_DATA_ROI: 5.0
      W_PHYS_ROI: 1.0
      W_DIV_ROI: 0.05
      W_MOM_ROI: 0.02
      W_BC_WALL_ROI: 0.0
      PHYS_RAMP_ENABLED: true
      PHYS_RAMP_START_EPOCH: 25
      PHYS_RAMP_END_EPOCH: 75
      PHYS_RAMP_APPLY_GLOBAL: false
      PHYS_RAMP_APPLY_ROI: true
      PHYS_RAMP_APPLY_BC: false
      ROI_DATA_P_WEIGHT: 3.0
      SUP_WEIGHT_NEAR_STRUCTURE_GAIN: 3.0
      SUP_WEIGHT_NEAR_STRUCTURE_DMAX: 2.0
      SUP_WEIGHT_WAKE_GAIN: 3.0
      SUP_WEIGHT_WAKE_ZREL_MAX: 30.0
      SUP_WEIGHT_WAKE_SPEED_RATIO_MAX: 0.75
      LR: 3.0e-5
